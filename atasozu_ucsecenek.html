<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atasözü Bilmece · Kahverengi Kutular</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            background: #0a1a2f;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .defter {
            width: 100%;
            max-width: 820px;
            height: 94vh;
            max-height: 780px;
            background: linear-gradient(160deg, #e2edf7 0%, #c5d9ed 60%, #a8c4e0 100%);
            border-radius: 2px 16px 16px 2px;
            box-shadow: -6px 0 0 #2a5f8a, 0 0 0 3px #4a8ab5, 6px 12px 48px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .defter::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(transparent, transparent 34px, rgba(30, 80, 140, 0.08) 34px, rgba(30, 80, 140, 0.08) 35px);
            pointer-events: none;
            z-index: 0;
        }

        .defter::after {
            content: '';
            position: absolute;
            left: 44px;
            top: 0; bottom: 0;
            width: 1.6px;
            background: rgba(40, 80, 150, 0.2);
            z-index: 1;
        }

        .baslik {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px 6px 20px;
            border-bottom: 1.5px solid rgba(40, 80, 150, 0.2);
            background: rgba(210, 230, 250, 0.5);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }

        .sol {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .etiket {
            background: rgba(30, 70, 130, 0.1);
            border: 1px solid rgba(40, 80, 150, 0.3);
            border-radius: 30px;
            padding: 2px 14px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #1a3a6a;
            letter-spacing: 0.3px;
        }

        .puan-etiketi {
            background: #1a4a7a;
            color: #c0dff5;
            border-color: #3a7aaa;
        }

        .sag {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ses-btn {
            background: #1a5a8a;
            border: none;
            color: #e0f0ff;
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            transition: 0.12s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
        .ses-btn:hover { background: #2a7aaa; }
        .ses-btn:active { transform: scale(0.95); }

        .sifirla-btn {
            background: transparent;
            border: 1px solid rgba(40, 80, 150, 0.4);
            color: #1a3a6a;
            border-radius: 30px;
            padding: 4px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }
        .sifirla-btn:hover { background: rgba(40, 80, 150, 0.12); }

        .govde {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px 14px 8px 52px;
            overflow: hidden;
            min-height: 0;
        }

        .deyim-alani {
            flex: 0 0 48%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10px 6px 8px 0;
            border-bottom: 1.5px solid rgba(40, 80, 150, 0.15);
            min-height: 0;
        }

        .deyim-baslik {
            font-size: 0.7rem;
            font-weight: 700;
            color: #2a5a8a;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.75;
        }

        .anlam-metin {
            font-family: 'Segoe UI', 'Georgia', serif;
            font-size: clamp(1.2rem, 2.8vh, 2rem);
            font-weight: 600;
            color: #0a1a3a;
            line-height: 1.5;
            direction: ltr;
            text-align: left;
        }

        .ornek-metin {
            font-size: clamp(0.85rem, 1.6vh, 1.15rem);
            font-weight: 400;
            color: #2a4a6a;
            margin-top: 6px;
            font-style: italic;
            opacity: 0.8;
            border-left: 3px solid rgba(40, 80, 150, 0.3);
            padding-left: 12px;
        }

        .soru-alani {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px 0 6px;
            min-height: 0;
            overflow: hidden;
        }

        .soru-etiket {
            font-size: 0.78rem;
            font-weight: 700;
            color: #1a3a6a;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        .secenekler {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 7px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .sec-btn {
            background: #6b4f3a;
            border: 2px solid #4d3526;
            border-radius: 50px;
            padding: 0 18px;
            min-height: 42px;
            font-size: 0.95rem;
            font-weight: 700;
            color: #f5ede6;
            cursor: pointer;
            text-align: center;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            transition: 0.15s;
            flex-shrink: 0;
            box-shadow: 0 4px 0 #3a281e;
        }
        .sec-btn:hover:not([disabled]) {
            background: #7d5d45;
            border-color: #5a3f2e;
            transform: translateY(-1px);
            box-shadow: 0 5px 0 #3a281e;
        }
        .sec-btn:active:not([disabled]) {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3a281e;
        }
        .sec-btn.dogru {
            background: #1e7a3a !important;
            border-color: #2e9a4a !important;
            color: #e8ffe8 !important;
            box-shadow: 0 0 20px rgba(46, 200, 80, 0.5);
        }
        .sec-btn.yanlis {
            background: #8a2a1a !important;
            border-color: #cc3a2a !important;
            color: #ffe0d8 !important;
            box-shadow: 0 0 20px rgba(200, 50, 30, 0.5);
        }
        .sec-btn[disabled] { 
            cursor: default; 
            transform: none !important;
            box-shadow: 0 4px 0 #3a281e !important;
        }

        .alt-cubuk {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 16px 8px 52px;
            border-top: 1.5px solid rgba(40, 80, 150, 0.2);
            background: rgba(210, 230, 250, 0.35);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 6px;
        }

        .geri-bildirim {
            font-size: 0.82rem;
            font-weight: 600;
            color: #1a3a6a;
            flex: 1;
            min-width: 0;
        }

        .sonraki-btn {
            background: linear-gradient(135deg, #1a5a8a, #3a8aba);
            border: none;
            padding: 7px 22px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 800;
            color: #e8f4ff;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-shadow: 0 3px 0 #0a3a5a, 0 4px 14px rgba(0,0,0,0.2);
            transition: 0.1s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .sonraki-btn:hover { background: linear-gradient(135deg, #2a6a9a, #4a9aca); }
        .sonraki-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #0a3a5a; }
        .sonraki-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        @media (max-height: 640px) {
            .anlam-metin { font-size: clamp(1rem, 2.2vh, 1.4rem); }
            .ornek-metin { font-size: clamp(0.7rem, 1.2vh, 0.9rem); }
            .sec-btn { min-height: 34px; font-size: 0.78rem; padding: 0 12px; }
            .deyim-alani { flex: 0 0 42%; }
        }

        @media (max-height: 500px) {
            .anlam-metin { font-size: 0.9rem; }
            .sec-btn { min-height: 30px; font-size: 0.7rem; }
            .govde { padding-left: 44px; }
            .defter::after { left: 36px; }
        }

        @media (min-width: 700px) {
            .govde { padding-left: 64px; }
            .defter::after { left: 52px; }
        }

        @keyframes confetti-fall {
            0% { opacity: 0; transform: translateY(-10px) rotate(0deg); }
            10% { opacity: 1; }
            100% { opacity: 0; transform: translateY(calc(80vh)) rotate(720deg); }
        }

        @keyframes sad-fall {
            0% { opacity: 0; transform: scale(0.3) rotate(-20deg); }
            20% { opacity: 1; transform: scale(1.1) rotate(5deg); }
            40% { transform: scale(0.95) rotate(-5deg); }
            60% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.8) rotate(10deg) translateY(60px); }
        }

        .efect-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .efect-piece {
            position: absolute;
            top: 20%;
            animation-duration: 1.8s;
            animation-timing-function: ease-out;
            animation-fill-mode: forwards;
            font-size: 2.2rem;
        }

        .efect-piece.confetti {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation-name: confetti-fall;
        }

        .efect-piece.sad {
            animation-name: sad-fall;
            font-size: 3.5rem;
        }
    </style>
</head>
<body>

<div class="defter">

    <div class="baslik">
        <div class="sol">
            <span class="etiket">📖 <span id="soruNo">1</span>/<span id="toplamSoru">10</span></span>
            <span class="etiket puan-etiketi">⭐ <span id="puan">0</span> puan</span>
        </div>
        <div class="sag">
            <button class="ses-btn" id="sesBtn">🔊 Oku</button>
            <button class="sifirla-btn" id="sifirlaBtn">🔄 Yeni Set</button>
        </div>
    </div>

    <div class="govde">

        <div class="deyim-alani">
            <div class="deyim-baslik">📝 Açıklama · Örnek</div>
            <div class="anlam-metin" id="anlamMetin"></div>
            <div class="ornek-metin" id="ornekMetin"></div>
        </div>

        <div class="soru-alani">

    </div>

</div>

        { deyim: "At olacak tay yürüyüşünden belli olur", anlam: "Bir kişinin gelecekteki başarısı küçük yaşta belli olur.", ornek: "At olacak tay yürüyüşünden belli olur, bu çocuk ileride çok başarılı olacak." },
        { deyim: "Atın en iyisi doru, yiğidin en iyisi deli olur", anlam: "Cesur ve atılgan kişiler daha çok dikkat çeker.", ornek: "Atın en iyisi doru, yiğidin en iyisi deli olur; o hep cesurdu." },

        { deyim: "Her işte bir hayır vardır", anlam: "Kötü görünen olayın iyi bir sonucu olabilir.", ornek: "Her işte bir hayır vardır; belki iyi olmuştur." },
        { deyim: "Gülme komşuna gelir başına", anlam: "Başkasının durumuyla alay etme.", ornek: "Gülme komşuna gelir başına; sakın." },
        { deyim: "Ne oldum dememeli ne olacağım demeli", anlam: "İnsanın koşulları değişebilir.", ornek: "Ne oldum dememeli ne olacağım demeli; mütevazı ol." },
        { deyim: "Bugün bana ise yarın sana", anlam: "Kişilerin koşulları değişebilir.", ornek: "Bugün bana ise yarın sana; şikayet etme." },
        { deyim: "İyilik yap denize at, balık bilmezse Halik bilir", anlam: "İyilik karşılık beklemeden yapılmalıdır.", ornek: "İyilik yap denize at, balık bilmezse Halik bilir; karşılık bekleme." },
        { deyim: "El elden üstündür", anlam: "Her zaman daha iyisi vardır.", ornek: "El elden üstündür; daha iyisini bulursun." },
        { deyim: "El el ile, değirmen yel ile", anlam: "İnsan yardımı ile iş başarılır.", ornek: "El el ile, değirmen yel ile; yardım edin." },
        { deyim: "Elin ağzı torba değil ki büzesin", anlam: "İnsanların konuşmasını engellemek zordur.", ornek: "Elin ağzı torba değil ki büzesin; ne derlerse desinler." },
        { deyim: "El için kuyu kazan evvela kendi düşer", anlam: "Başkasına kötülük yapan kendi zararını görür.", ornek: "El için kuyu kazan evvela kendi düşer; sakın." },
        { deyim: "Ateş olmayan yerden duman çıkmaz", anlam: "Söylentilerin bir nedeni vardır.", ornek: "Ateş olmayan yerden duman çıkmaz; bir şey var." },
        { deyim: "Ateşin düştüğü yeri yakar", anlam: "Acıyı en çok yaşayan bilir.", ornek: "Ateşin düştüğü yeri yakar; o ne çektiğini bilir." },
        { deyim: "Güneş balçıkla sıvanmaz", anlam: "Gerçekler gizlenemez.", ornek: "Güneş balçıkla sıvanmaz; her şey ortaya çıkar." },
        { deyim: "Korkunun ecele faydası yoktur", anlam: "Korkmak sonucu değiştirmez.", ornek: "Korkunun ecele faydası yoktur; korkma." },
        { deyim: "İğneyi kendine, çuvaldızı başkasına batır", anlam: "Eleştirmeden önce kendini düşün.", ornek: "İğneyi kendine, çuvaldızı başkasına batır; önce kendini eleştir." },
        { deyim: "Lafla peynir gemisi yürümez", anlam: "Sadece konuşmakla iş bitmez.", ornek: "Lafla peynir gemisi yürümez; harekete geç." }
    ];

    // ─── OYUN DURUMU ────────────────────────────────────────────────
    let setSoru = [];
    let indeks = 0;
    let puan = 0;
    let cevapVerildi = false;
    let zamanlayici = null;
    const SET_ADET = 10;

    // ─── SES & EFEKT ──────────────────────────────────────────────────
    let alkisCtx = null;
    function alkisCal() {
        try {
            alkisCtx = alkisCtx || new (window.AudioContext || window.webkitAudioContext)();
            const ctx = alkisCtx;
            if (ctx.state === 'suspended') ctx.resume();
            const dur = 1.1;
            const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) {
                const t = i / data.length;
                const env = Math.sin(Math.PI * t) * (1 - t * 0.3);
                const clap = (Math.random() * 2 - 1) * (Math.random() < 0.06 ? 1 : 0.25);
                data[i] = clap * env * 0.5;
            }
            const src = ctx.createBufferSource();
            src.buffer = buf;
            const filt = ctx.createBiquadFilter();
            filt.type = 'bandpass'; filt.frequency.value = 1800; filt.Q.value = 0.7;
            const gain = ctx.createGain(); gain.gain.value = 0.9;
            src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
            src.start();
        } catch (e) { /* sessiz */ }
    }

    function efektGoster(tur) {
        const wrap = document.createElement('div');
        wrap.className = 'efect-container';
        document.body.appendChild(wrap);

        if (tur === 'confetti') {
            const renkler = ['#ffd700', '#ff6b6b', '#4ecdc4', '#45b7d1', '#ff85a2', '#ffb347', '#a8e6cf'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'efect-piece confetti';
                const left = 5 + Math.random() * 90;
                const size = 6 + Math.random() * 10;
                const color = renkler[Math.floor(Math.random() * renkler.length)];
                const delay = Math.random() * 0.3;
                const rot = Math.random() * 360;
                const dur = 1.4 + Math.random() * 1.2;
                p.style.cssText = `
                    left: ${left}%;
                    width: ${size}px;
                    height: ${size * (0.4 + Math.random() * 0.6)}px;
                    background: ${color};
                    border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    animation-delay: ${delay}s;
                    animation-duration: ${dur}s;
                    transform: rotate(${rot}deg);
                `;
                wrap.appendChild(p);
            }
            setTimeout(() => wrap.remove(), 3000);
        } else {
            // üzülme efekti
            const emojiler = ['😢', '😔', '💔', '😕', '😞', '☹️', '😟'];
            const emoji = emojiler[Math.floor(Math.random() * emojiler.length)];
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'efect-piece sad';
                p.textContent = emoji;
                const left = 10 + Math.random() * 80;
                const delay = Math.random() * 0.4;
                const dur = 1.5 + Math.random() * 0.8;
                p.style.cssText = `
                    left: ${left}%;
                    top: ${15 + Math.random() * 30}%;
                    animation-delay: ${delay}s;
                    animation-duration: ${dur}s;
                    font-size: ${2.5 + Math.random() * 2}rem;
                `;
                wrap.appendChild(p);
            }
            setTimeout(() => wrap.remove(), 2800);
        }
    }

    function kutla() {
        alkisCal();
        efektGoster('confetti');
    }

    function uzul() {
        efektGoster('sad');
    }

    function karistir(dizi) {
        const k = [...dizi];
        for (let i = k.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [k[i], k[j]] = [k[j], k[i]];
        }
        return k;
    }

    function setOlustur() {
        const hepsi = [...ATASOZLERI];
        const secilen = karistir(hepsi).slice(0, SET_ADET);
        return secilen.map(s => {
            const diger = ATASOZLERI.filter(d => d.deyim !== s.deyim).map(d => d.deyim);
            const yanlis = karistir(diger).slice(0, 2);
            const secenekler = karistir([s.deyim, ...yanlis]);
            return {
                deyim: s.deyim,
                anlam: s.anlam,
                ornek: s.ornek,
                secenekler: secenekler
            };
        });
    }

    function render() {
        clearTimeout(zamanlayici);
        if (indeks >= setSoru.length) {
            document.getElementById('geriBildirim').textContent = '🎉 Set tamamlandı! Yeni Set ile devam edin.';
            document.getElementById('sonrakiBtn').disabled = true;
            document.getElementById('sesBtn').disabled = true;
            return;
        }

        const soru = setSoru[indeks];
        document.getElementById('soruNo').textContent = indeks + 1;
        document.getElementById('toplamSoru').textContent = SET_ADET;
        document.getElementById('anlamMetin').textContent = soru.anlam;
        document.getElementById('ornekMetin').textContent = '“' + soru.ornek + '”';

        const kutu = document.getElementById('secenekKutu');
        kutu.innerHTML = '';
        soru.secenekler.forEach(sec => {
            const btn = document.createElement('button');
            btn.className = 'sec-btn';
            btn.textContent = sec;
            btn.addEventListener('click', () => cevapKontrol(sec));
            kutu.appendChild(btn);
        });

        document.getElementById('geriBildirim').textContent = '💡 Bir seçenek seçin';
        cevapVerildi = false;
        document.getElementById('sonrakiBtn').disabled = false;
        document.getElementById('sesBtn').disabled = false;
    }

    function cevapKontrol(secim) {
        if (cevapVerildi) return;
        cevapVerildi = true;
        const soru = setSoru[indeks];
        const dogru = secim === soru.deyim;

        const butonlar = document.querySelectorAll('.sec-btn');
        
        if (dogru) {
            puan++;
            document.getElementById('puan').textContent = puan;
            document.getElementById('geriBildirim').textContent = '✅ Doğru! +1 puan';
            // doğru cevabı yeşil yap
            butonlar.forEach(b => {
                if (b.textContent === soru.deyim) {
                    b.classList.add('dogru');
                }
                b.disabled = true;
            });
            kutla();
        } else {
            document.getElementById('geriBildirim').textContent = '❌ Yanlış! Doğru: ' + soru.deyim;
            butonlar.forEach(b => {
                b.disabled = true;
                if (b.textContent === soru.deyim) {
                    b.classList.add('dogru');
                } else if (b.textContent === secim) {
                    b.classList.add('yanlis');
                }
            });
            uzul();
        }

        zamanlayici = setTimeout(ileri, 1800);
    }

    function ileri() {
        if (!cevapVerildi) {
            document.getElementById('geriBildirim').textContent = '⚠️ Önce cevap seçin!';
            return;
        }
        indeks++;
        render();
    }

    let ses = null;
    function sesOku(anlam, ornek) {
        if (!window.speechSynthesis) return;
        const metin = `Açıklama: ${anlam}. Örnek: ${ornek}`;
        if (ses) {
            speechSynthesis.cancel();
        }
        const u = new SpeechSynthesisUtterance(metin);
        u.lang = 'tr-TR';
        u.rate = 0.8;
        u.pitch = 1;
        speechSynthesis.speak(u);
    }

    function sifirla() {
        clearTimeout(zamanlayici);
        speechSynthesis.cancel();
        setSoru = setOlustur();
        indeks = 0;
        puan = 0;
        cevapVerildi = false;
        document.getElementById('puan').textContent = '0';
        render();
    }

    document.getElementById('sonrakiBtn').addEventListener('click', ileri);
    document.getElementById('sifirlaBtn').addEventListener('click', sifirla);
    document.getElementById('sesBtn').addEventListener('click', () => {
        if (indeks < setSoru.length) {
            const s = setSoru[indeks];
            sesOku(s.anlam, s.ornek);
        }
    });

    setSoru = setOlustur();
    render();
</script>

</body>
</html>
